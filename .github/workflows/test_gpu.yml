name: Test GPU

on:
  schedule:
    - cron: "30 2 */1 * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to test"
        required: true
        type: number

jobs:
  test:
    name: Test GPU
    runs-on: gpu
    env:
      DEEPINV_MOCK_TESTS: "True"
      DEEPINV_DOWNLOAD_VERBOSE: "False"
      WORKING_DIR: "/local/jtachell"
      PIXI_HOME: "/local/jtachell/.pixi"
      TMP_DIR: "/local/jtachell/tmp"
      DEEPINV_CACHE_DIR: "/local/jtachell/.cache/deepinv"
      HF_HOME: "/local/jtachell/.cache/huggingface"
      TORCH_HOME: "/local/jtachell/.cache/torch"

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha
                  || (inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number))
                  || github.sha }}

      # When testing a PR, restore the pixi.lock + .testmondata + .coverage triple solved on
      # main as a SINGLE cache entry (atomic, no lock/testmondata mismatch) so
      # pixi installs the exact package set that produced .testmondata, keeping
      # testmon's environment fingerprint stable. Restored *before* Setup Pixi
      # so the action installs from this lock. Baseline runs (schedule / push
      # to main) restore nothing and solve fresh to track latest deps.
      - name: Restore pixi.lock + .testmondata + .coverage
        if: inputs.pr_number != ''
        uses: actions/cache/restore@v4
        id: restore-cache
        with:
          path: |
            pixi.lock
            .testmondata
            .coverage
          key: testmon-gpu-main-${{ github.run_id }}
          restore-keys: |
            testmon-gpu-main-

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: latest
          post-cleanup: true
          pixi-bin-path: /local/jtachell/pixi/bin/pixi
          run-install: false  # we drive installation manually below

      # Install dependencies with pixi, using the restored lock if available. If the
      # lock is unavailable or fails to solve, fall back to a fresh solve. 
      - name: Install dependencies
        run: |
          set -x
          if ! pixi install -e full --locked --manifest-path pyproject.toml --color always; then
            echo "pixi install with --locked option failed, run install without lock"
            pixi install -e full --manifest-path pyproject.toml --color always
          fi

          pixi list -e full --manifest-path pyproject.toml --color always

          pixi clean cache --yes
          set +x

      - name: Check import
        run: |
          pixi run -e full python -c "import deepinv"

      - name: Check CUDA is available
        run: |
          pixi run -e full python -c "
          import torch
          assert torch.cuda.is_available(), (
              f'torch.cuda.is_available() returned False. '
              f'Device count: {torch.cuda.device_count()}, '
              f'PyTorch build: {torch.version.cuda}'
          )
          print(f'CUDA OK — {torch.cuda.device_count()} device(s), '
                f'CUDA {torch.version.cuda}, '
                f'GPU: {torch.cuda.get_device_name(0)}')
          "

      # On main, we never restore the cache, so .testmondata and .coverage never exist. We run the full suite to compute a base coverage for the main branch, we also run testmon to compute a base .testmondata for the main branch. 

      # On PRs, we restore the cache from main, so testmon skips unrelated tests and --cov-append updates coverage with respect to related changes. 
      # In case .coverage is not restored properly (for any reasons), but .testmondata is restored, we run pytest without testmon to compute full coverage results. This is a corner case that should not happen, but we handle it anyway.
      - name: Test with pytest
        shell: bash
        run: |
          TESTMON_FLAG="--testmon"
          if [ -f .testmondata ] && [ ! -f .coverage ]; then
            TESTMON_FLAG=""
          fi
          set -x
          pixi run -e full pytest -n 2 --dist=loadgroup --cov=deepinv --cov-report=xml:coverage-full.xml --cov-append $TESTMON_FLAG --durations=30
          set +x

      # Save the freshly-solved lock + .testmondata + .coverage as a single (atomic) matched
      # baseline pair. Only on main and only for baseline runs (not PR-dispatch),
      # so a PR's env/results never overwrite the main baseline.
      - name: Save pixi.lock + .testmondata + .coverage
        uses: actions/cache/save@v4
        if: github.ref == 'refs/heads/main' && inputs.pr_number == '' # Only save baseline cache on main
        with:
          path: |
            pixi.lock
            .testmondata
            .coverage
          key: testmon-gpu-main-${{ github.run_id }}

      - name: Post result to PR
        if: always() && inputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.inputs.pr_number;
            const result = "${{ job.status }}";
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = result === "success"
              ? `✅ GPU tests passed\n\n🔗 [View run details](${runUrl})`
              : `❌ GPU tests failed\n\n🔗 [View run details](${runUrl})`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body,
            });

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-full.xml
          flags: full
          name: full-coverage

      - name: Cleanup Pixi
        if: always()
        run: |
          rm -rf /local/jtachell/pixi

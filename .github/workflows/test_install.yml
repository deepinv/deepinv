name: Test Install Methods

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 06:00 UTC

jobs:
  pip:
    name: "pip (${{ matrix.os }}, ${{ matrix.source }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        source: [pypi, git]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deepinv from PyPI
        if: matrix.source == 'pypi'
        run: pip install deepinv

      - name: Install deepinv from git
        if: matrix.source == 'git'
        run: pip install git+https://github.com/deepinv/deepinv.git#egg=deepinv

      - name: Test import
        run: python -c "import deepinv; print('deepinv', deepinv.__version__)"

  uv:
    name: "uv (${{ matrix.os }}, ${{ matrix.source }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        source: [pypi, git]
    steps:
      - uses: astral-sh/setup-uv@v6

      - name: Install deepinv from PyPI
        if: matrix.source == 'pypi'
        run: |
          uv venv
          uv pip install deepinv

      - name: Install deepinv from git
        if: matrix.source == 'git'
        run: |
          uv venv
          uv pip install git+https://github.com/deepinv/deepinv.git#egg=deepinv

      - name: Test import
        run: uv run python -c "import deepinv; print('deepinv', deepinv.__version__)"

  pixi:
    name: "pixi (${{ matrix.os }}, ${{ matrix.source }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        source: [pypi, git]
    steps:
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          run-install: false  # do not install from the repo's pyproject.toml

      - name: Install deepinv from PyPI
        if: matrix.source == 'pypi'
        shell: bash
        run: |
          mkdir test_project
          cd test_project
          pixi init
          pixi add python
          pixi add --pypi deepinv
          pixi run python -c "import deepinv; print('deepinv', deepinv.__version__)"

      - name: Install deepinv from git
        if: matrix.source == 'git'
        shell: bash
        run: |
          mkdir test_project
          cd test_project
          pixi init
          pixi add python
            pixi add --pypi "deepinv @ git+https://github.com/deepinv/deepinv.git"
          pixi run python -c "import deepinv; print('deepinv', deepinv.__version__)"

  conda:
    name: "conda (${{ matrix.os }}, ${{ matrix.source }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        source: [pypi, git]
    steps:
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          activate-environment: test-env
          auto-activate-base: false

      - name: Install deepinv from conda-forge
        if: matrix.source == 'pypi'
        shell: bash -el {0}
        # TODO: requests is missing from the conda-forge recipe for deepinv;
        # install it explicitly until the recipe is fixed upstream.
        run: conda install -c conda-forge deepinv requests -y

      - name: Pre-install pytorch from conda-forge (git source)
        if: matrix.source == 'git'
        shell: bash -el {0}
        # Install torch/torchvision from conda-forge first so that the pip install
        # below finds them already satisfied and does not pull in a PyPI-built torch
        # that bundles conflicting native libraries (e.g. libprotobuf on macOS).
        run: conda install -c conda-forge pytorch torchvision -y

      - name: Install deepinv from git
        if: matrix.source == 'git'
        shell: bash -el {0}
        run: pip install git+https://github.com/deepinv/deepinv.git#egg=deepinv

      - name: Test import
        shell: bash -el {0}
        run: python -c "import deepinv; print('deepinv', deepinv.__version__)"

name: Build docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: latest
          environments: docs doctest

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Fetch PR issue comments
        id: get_comments
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENTS=$(curl -s \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments")
      
          echo "pr_comments<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine which examples to run
        id: get_pattern
        env:
          PR_COMMENTS: ${{ steps.get_comments.outputs.pr_comments }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            if printf "%s" "$PR_COMMENTS" | grep -iq "test-examples"; then
              PATTERN=".*"
              echo "Keyword 'test-examples' found. Forcing full build."
            else
              BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
              HEAD_REF="HEAD"
              PATTERN=$(pixi run -e docs python .github/scripts/diff_sphinx_gallery.py "$BASE_REF" "$HEAD_REF")
              echo "Conditional PR Pattern: $PATTERN"
            fi
          else
            PATTERN=".*"
          fi
          echo "SG_PATTERN=$PATTERN" >> $GITHUB_OUTPUT

      - name: Build documentation chosen examples
        env:
          SG_PATTERN: ${{ steps.get_pattern.outputs.SG_PATTERN }}
        run: |
           echo "Running Sphinx with filename_pattern: $SG_PATTERN"
           pixi run -e docs-cpu sphinx-build -W docs/source _build -D "sphinx_gallery_conf.filename_pattern=$SG_PATTERN"

      - name: Notebook generation
        run: |
          set -euo pipefail
          mkdir -p _build/auto_examples/_notebooks
          find examples -type f -name '*.py' | while read -r f; do
            rel="${f#examples/}"
            out_dir="_build/auto_examples/_notebooks/$(dirname "$rel")"
            mkdir -p "$out_dir"
            base="$(basename "$rel" .py)"
            out_path="$out_dir/$base.ipynb"
            pixi run -e doctest-cpu python .github/scripts/convert_to_notebook.py --input "$f" --output "$out_path"
          done

      - name: Upload Documentation Artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: _build/

      - name: Link to generated docs
        if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
        run: |
          echo "Documentation artifact URL: ${{ steps.upload-artifact.outputs.artifact-url }}"

      - name: Run doctests
        env:
          TQDM_DISABLE: 1
          HF_HUB_DISABLE_PROGRESS_BARS: 1
          DEEPINV_DOWNLOAD_VERBOSE: 0
        run: |
          pixi run -e doctest pytest --doctest-glob="*.rst" docs/ \
            --ignore=docs/source/user_guide/training/multigpu.rst \
            --ignore=docs/source/user_guide/training/datasets.rst
